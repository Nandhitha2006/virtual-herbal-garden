<!DOCTYPE html>
<html>
<head>
    <title>Login - Virtual Herbal Garden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="register-container">

    <h1>🌿 Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

<script src="login.js"></script>

</body>
</html>
